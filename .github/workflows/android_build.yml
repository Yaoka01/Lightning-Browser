name: Lightning Browser Mod CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Kita harus memanggil 'lightningPlusDebug' karena flavor 'lite' dimatikan saat CI=true
    - name: Build Lightning Plus Debug
      run: ./gradlew assembleLightningPlusDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Lightning-Plus-Mod
        # Path disesuaikan dengan struktur folder build flavor Plus
        path: app/build/outputs/apk/lightningPlus/debug/*.apk
